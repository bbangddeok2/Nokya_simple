<!-- index.html -->
<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nokya</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- HEADER -->
    <header class="header">
      <div class="logo">Nokya</div>

      <nav class="nav">
        <a href="#about" data-i18n="menu.about">About</a>
        <a href="#record" data-i18n="menu.archive">Archive</a>
        <a href="#shop" data-i18n="menu.shop">Shop</a>
        <a href="#" id="langToggle">EN</a>
      </nav>
    </header>

    <!-- ✅ SECTION 1 = fixed 배경 (항상 뒤에 깔림) -->
    <section class="sec_1" id="home" aria-label="Hero">
      <img src="img/sec_1.png" alt="hero" />
    </section>

    <!-- ✅ 1화면 스크롤 여유: 섹션1 높이만큼 내려가야 섹션2가 등장 -->
    <div class="hero-spacer" aria-hidden="true"></div>

    <!-- ✅ SECTION 2부터 = 섹션1 위로 덮는 레이어 -->
    <main class="overlay" id="overlay">
      <!-- SECTION 2 (About) : 한 번 멈춤(스티키) -->
      <section class="sec_2" id="about">
        <div class="about_sticky">
          <div class="about_text" data-i18n="about.desc">
            녹야는 말없이 타는 작은 양초도깨비입니다.<br />
            낮은 온도의 위로를 이곳에 남기고,<br />
            감정에 흔들려도 쉽게 꺼지지 않는 순간들을 기록합니다.
          </div>
        </div>
      </section>

      <!-- SECTION 3 -->
      <section class="sec_3" id="record">
        <div class="container">
          <div class="title" data-i18n="title.archive">도깨비즈의 기록</div>

          <div class="content_wrap_3">
            <a
              class="grid_card"
              href="https://www.instagram.com/nokyaong/"
              target="_blank"
              rel="noopener"
              ><img src="img/sec_3_1.png" alt=""
            /></a>
            <a
              class="grid_card"
              href="https://www.instagram.com/nokyaong/"
              target="_blank"
              rel="noopener"
              ><img src="img/sec_3_2.png" alt=""
            /></a>
            <a
              class="grid_card"
              href="https://www.instagram.com/nokyaong/"
              target="_blank"
              rel="noopener"
              ><img src="img/sec_3_3.png" alt=""
            /></a>
            <a
              class="grid_card"
              href="https://www.instagram.com/nokyaong/"
              target="_blank"
              rel="noopener"
              ><img src="img/sec_3_4.png" alt=""
            /></a>
            <a
              class="grid_card"
              href="https://www.instagram.com/nokyaong/"
              target="_blank"
              rel="noopener"
              ><img src="img/sec_3_5.png" alt=""
            /></a>
            <a
              class="grid_card"
              href="https://www.instagram.com/nokyaong/"
              target="_blank"
              rel="noopener"
              ><img src="img/sec_3_6.png" alt=""
            /></a>
            <a
              class="grid_card"
              href="https://www.instagram.com/nokyaong/"
              target="_blank"
              rel="noopener"
              ><img src="img/sec_3_7.png" alt=""
            /></a>
            <a
              class="grid_card"
              href="https://www.instagram.com/nokyaong/"
              target="_blank"
              rel="noopener"
              ><img src="img/sec_3_8.png" alt=""
            /></a>
          </div>

          <!-- From Instagram -->
          <div class="insta-block">
            <div class="insta-title" data-i18n="insta.from">From Instagram</div>

            <div class="turn-wrap" aria-label="Instagram loop">
              <!-- ✅ 여기에는 "원본 1세트(5개)"만 넣어도 됨.
                 JS가 자동으로 복제해서 끊김 없이 채움 -->
              <div class="turn top_turn" id="instaTurn">
                <a
                  class="turn_con"
                  href="https://www.instagram.com/nokyaong/"
                  target="_blank"
                  rel="noopener"
                  ><img src="img/insta_1.png" alt=""
                /></a>
                <a
                  class="turn_con"
                  href="https://www.instagram.com/nokyaong/"
                  target="_blank"
                  rel="noopener"
                  ><img src="img/insta_2.png" alt=""
                /></a>
                <a
                  class="turn_con"
                  href="https://www.instagram.com/nokyaong/"
                  target="_blank"
                  rel="noopener"
                  ><img src="img/insta_3.png" alt=""
                /></a>
                <a
                  class="turn_con"
                  href="https://www.instagram.com/nokyaong/"
                  target="_blank"
                  rel="noopener"
                  ><img src="img/insta_4.png" alt=""
                /></a>
                <a
                  class="turn_con"
                  href="https://www.instagram.com/nokyaong/"
                  target="_blank"
                  rel="noopener"
                  ><img src="img/insta_5.png" alt=""
                /></a>
              </div>
            </div>

            <a
              class="insta-btn"
              href="https://www.instagram.com/nokyaong/"
              target="_blank"
              rel="noopener"
              data-i18n="btn.instaMore"
            >
              인스타에서 더 보기
            </a>
          </div>
        </div>
      </section>

      <!-- SECTION 4 -->
      <section class="sec_4" id="shop">
        <div class="container">
          <div class="title" data-i18n="title.shop">도깨비즈 상점</div>

          <div class="shop_wrap">
            <a class="shop_link" href="#"
              ><div class="shop_item">
                <img src="img/sec_4_3.png" alt="" />
                <p data-i18n="goods.item1">작은 물건들</p>
              </div></a
            >
            <a class="shop_link" href="#"
              ><div class="shop_item">
                <img src="img/sec_4_2.png" alt="" />
                <p data-i18n="goods.item2">카페의 시간</p>
              </div></a
            >
            <a class="shop_link" href="#"
              ><div class="shop_item">
                <img src="img/sec_4_3.png" alt="" />
                <p data-i18n="goods.item3">반짝이는 순간</p>
              </div></a
            >
            <a class="shop_link" href="#"
              ><div class="shop_item">
                <img src="img/sec_4_3.png" alt="" />
                <p data-i18n="goods.item4">부드러운 하루</p>
              </div></a
            >
          </div>
        </div>
      </section>

      <!-- FOOTER -->
      <footer class="footer">
        <div class="footer_line"></div>
        <div class="footer_logo">Nokya</div>
        <div class="sns_wrap">
          <div class="sns_icon">
            <a href="https://www.instagram.com/nokyaong/">
              <img src="img/insta_icon.png" alt="insta_logo" />
            </a>
          </div>
          <div class="sns_icon">
            <a href="https://www.youtube.com/@Nokyaong">
              <img src="img/youtube_icon.png" alt="youtube_logo" />
            </a>
          </div>
          <div class="sns_icon">
            <a href="https://x.com/Nokya_ong/">
              <img src="img/X_icon.png" alt="twitter_logo" />
            </a>
          </div>
          <div class="sns_icon">
            <a href="https://www.tiktok.com/@nokya_yaong">
              <img src="img/tiktok_icon.png" alt="tiktok_logo" />
            </a>
          </div>
        </div>
        <div class="copy">© 2026 Dokkaebiz. All rights reserved.</div>
      </footer>
    </main>

    <script src="js/main.js"></script>
  </body>
</html>
